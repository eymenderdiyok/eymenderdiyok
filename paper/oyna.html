<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Paper IO 2 - Eymen Derdiyok Games</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
    
    /* APPLE HEADER */
    header {
      display: flex; align-items: center; padding: 0 20px; height: 52px;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0;
    }
    .back-btn { text-decoration: none; color: #0071e3; font-size: 16px; font-weight: 400; flex: 0 0 100px; }
    header h1 { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #1d1d1f; margin: 0; }
    
    .fs-btn { 
      flex: 0 0 100px; text-align: right; background: none; border: none; 
      color: #0071e3; font-size: 15px; cursor: pointer; font-weight: 400; font-family: inherit;
    }

    /* OYUN ALANI */
    .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; position: relative; }
    
    #game-wrapper {
      width: 100%; max-width: 1000px; height: 100%; max-height: 600px;
      position: relative; border-radius: 30px; overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      display: none; /* Şifre girilene kadar gizli */
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    iframe { width: 100%; height: 100%; border: none; background: #000; display: block; }

    /* ŞİFRE EKRANI */
    #lock-screen {
      position: absolute; inset: 0; background: #f5f5f7;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }

    .pass-card {
      background: white; padding: 40px; border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 300px;
    }

    .pass-card h2 { font-size: 22px; margin-bottom: 20px; color: #1d1d1f; }

    .pass-input {
      width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px;
      font-size: 18px; text-align: center; outline: none; margin-bottom: 20px;
      box-sizing: border-box; transition: border-color 0.3s;
    }

    .pass-input:focus { border-color: #0071e3; }

    .submit-btn {
      background: #0071e3; color: white; border: none; padding: 12px 30px;
      border-radius: 20px; font-size: 16px; font-weight: 500; cursor: pointer;
      width: 100%; transition: background 0.3s;
    }

    #error-msg { color: #ff3b30; font-size: 14px; margin-top: 10px; display: none; }

    /* TAM EKRAN MODU */
    #game-wrapper:fullscreen { max-width: none; max-height: none; border-radius: 0; width: 100vw; height: 100vh; }
    #game-wrapper:-webkit-full-screen { max-width: none; max-height: none; border-radius: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<header>
  <a href="https://eymenderdiyok.com.tr" class="back-btn">‹ Menü</a>
  <h1>Paper IO 2</h1>
  <button class="fs-btn" onclick="toggleFullScreen()">Tam Ekran</button>
</header>

<div class="container">
  <div id="lock-screen">
    <div class="pass-card">
      <h2>Oyun Kilitli</h2>
      <input type="password" id="entry-pass" class="pass-input" placeholder="Şifreyi Girin">
      <button class="submit-btn" onclick="unlockGame()">Oyna</button>
      <p id="error-msg">Hatalı şifre, tekrar deneyin.</p>
    </div>
  </div>

  <div id="game-wrapper">
    <iframe id="game" src="data/index.html" allow="autoplay; fullscreen; gamepad"></iframe>
  </div>
</div>

<script>
  const MASTER_KEY = "534127";

  function unlockGame() {
    const input = document.getElementById('entry-pass').value;
    const error = document.getElementById('error-msg');
    const lockScreen = document.getElementById('lock-screen');
    const gameWrapper = document.getElementById('game-wrapper');

    if (input === MASTER_KEY) {
      lockScreen.style.display = 'none';
      gameWrapper.style.display = 'block';
      setTimeout(() => {
        gameWrapper.style.opacity = '1';
        document.getElementById('game').focus();
      }, 50);
    } else {
      error.style.display = 'block';
      document.getElementById('entry-pass').value = '';
    }
  }

  // Enter tuşu desteği
  document.getElementById('entry-pass').addEventListener("keypress", function(e) {
    if (e.key === "Enter") unlockGame();
  });

  function toggleFullScreen() {
    const elem = document.getElementById("game-wrapper");
    const btn = document.querySelector(".fs-btn");

    if (elem.style.display === "none") return;

    if (!document.fullscreenElement) {
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      }
      btn.innerText = "Küçült";
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
      btn.innerText = "Tam Ekran";
    }
  }

  window.addEventListener('mousedown', () => { 
    const gameFrame = document.getElementById('game');
    if(gameFrame) gameFrame.focus(); 
  });
  
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      document.querySelector(".fs-btn").innerText = "Tam Ekran";
    }
  });
</script>

</body>
</html>
